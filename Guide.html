<!DOCTYPE html>
<html lang="en">
  <header>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Machine Stops Guide</title>
    <link rel="icon" type="image/png" href="Logo.png">
  </header>
  <body>
    <style>
        #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #121212;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #333;
        border-top: 5px solid #007bff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        }
        @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
        }
        #main-content {
        opacity: 0;
        transition: opacity 0.5s ease;
        }
        h1 {
            align-items: center;
            margin: auto;
            height: 1%;
            display: flex;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        h2, p {
            align-items: center;
            margin-top: auto;
            height: 20%;
            display: flex;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        a {
            align-items: center;
            margin: 4%;
            height: 20%;
            display: flex;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: rgb(0, 196, 236);
        }
        p {
            margin-left: 5%;
            margin-right: 5%;
        }
        button {
            border: 5px;
            border-radius: 35px;
            padding: 5%;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 45px;
            margin: 3%;
            cursor: pointer;
        }
        button:active {
            transform: scale(1.05);
            transition: 100ms ease-in-out;
        }
        .small {
            font-size: x-small;
        }
        .center {
            align-items: center;
            justify-content: center;
            display: flex;
        }
        img {
            margin: 1%;
        }
    </style>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
  </div>

  <div id="main-content">
    <h1>Under Construction</h1>
    <div class="center">
        <img src="construction.png" width="15%">
    </div>
  </body>
  <footer>
    <div class="center">
        <a href="index.html">
            <h6>About the Author</h6>
        </a>
        <br>
        <a href="Context.html">
            <h6>Context</h6>
        </a>
    </div>
    <p class="small">English Project on E.M. Forster 2026</p>
  </footer>
  </div>
  <script>
    const imagesToPreload = [
      'construction.png',
      'up-arrow.png'
    ];

    let loadedCount = 0;
    const totalImages = imagesToPreload.length;
    function revealSite() {
      const loader = document.getElementById('loader');
      const content = document.getElementById('main-content');
      
      loader.style.opacity = '0';
      loader.style.visibility = 'hidden';
      content.style.opacity = '1';
    }
    if (totalImages === 0) {
      revealSite();
    } else {
      imagesToPreload.forEach(url => {
        const img = new Image();
        img.onload = handleImageLoad;
        img.onerror = handleImageLoad; 
        
        img.src = url;
      });
    }
    function handleImageLoad() {
      loadedCount++;
      if (loadedCount === totalImages) {
        revealSite();
      }
    }
  </script>
</html>
