<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <style>
        body {
            text-align: center;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        .center {
            align-items: center;
            justify-content: center;
            align-self: center;
        }
        .question {
            width: 50%;
            margin-left: 25%;
            margin-right: 25%;
            text-align: left;
        }
        @media only screen and (prefers-color-scheme: dark) {
            body {
                background-color: #1b1b1b;
                color: white;
            }
        }
        input {
            margin-top: 15px;
            cursor: pointer;
        }
        input:active {
            transform: scale(1.2);
            transition: 100ms ease;
        }
        label {
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>Quiz</h1>
    <form>
        <div class="question center">
            <h2>Question 1:</h2>
            <h3>Who wrote <i>The Futurist Movement</i> in 1909?</h3>
            <input type="radio" id="Forster" name="1">
            <label for="Forster">E.M. Forster</label><br>
            <input type="radio" id="Marinetti" name="1">
            <label for="Marinetti">Filippo Marinetti</label><br>
            <input type="radio" id="Charles" name="1">
            <label for="Charles">Charles Dickens</label><br>
            <input type="radio" id="Wells" name="1">
            <label for="Wells">H.G. Wells</label>
        </div>
    </form>
</body>
</html>
