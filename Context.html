<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Machine Stops Context</title>
        <link rel="icon" type="image/png" href="Logo.png">
    </head>
    <body>
        <style>
            h1 {
                align-items: center;
                margin: auto;
                height: 1%;
                display: flex;
                justify-content: center;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            }
            h2, p {
                align-items: center;
                margin-top: auto;
                height: 20%;
                display: flex;
                justify-content: center;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            }
            p {
                margin-left: 5%;
                margin-right: 5%;
            }
            div {
                align-items: center;
                justify-content: center;
                display: flex;
            }
            .arrow {
                cursor: pointer;
                margin: 50px;
                justify-content: center;
                align-items: center;
            }
            button {
                border: 5px;
                border-radius: 35px;
                padding: 2%;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                font-size: 45px;
                margin: 1%;
                cursor: pointer;
            }
            button:active {
                transform: scale(1.05);
                transition: 100ms ease-in-out;
            }
            .b {
                background-color: rgb(255, 38, 0);
            }
            .b:active {
                background-color: rgb(181, 27, 0);
            }
            .t {
                background-color: rgb(26, 255, 0);
            }
            .t:active {
                background-color: rgb(60, 181, 0);
            }
            .s {
                background-color: rgb(0, 208, 255);
            }
            .s:active {
                background-color: rgb(0, 175, 181);
            }
            .r {
                background-color: rgb(0, 166, 255);
            }
            .r:active {
                background-color: rgb(0, 72, 181);
            }
        </style>
        <h1 id="Title">The Machine Stops Context</h1>
        <br>
        <div>
            <h2>Types of context:</h2>
        </div>
        <div>
            <button id="Books" class="b">Other Books</button>
            <button id="Things" class="t">Historical</button>
            <button id="Social" class="s">Social</button>
            <button id="Religion" class="r">Religious</button>
        </div>
        <div class="arrow" id="up-arrow">
            <img src="up-arrow.png" height="30">
        </div>
        <script>
            const arrow = document.getElementById("up-arrow");

            function scrollToTop() {
                document.getElementById('Title').scrollIntoView({ behavior: 'smooth', block: 'start' })
            }
            arrow.addEventListener('click', scrollToTop);
        </script>
    </body>
</html>
