<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>E.M. Forster</title>
        <link rel="icon" type="image/png" href="Logo.png">
    </head>
    <body>
        <style>
            #loader {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background-color: #121212;
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                transition: opacity 0.5s ease, visibility 0.5s ease;
            }
            .spinner {
                width: 50px;
                height: 50px;
                border: 5px solid #333;
                border-top: 5px solid #007bff;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
            @media only screen and (prefers-color-scheme: dark) {
                body {
                    background-color: #1b1b1b;
                    color: #ffffff;
                }
            }
            #main-content {
                opacity: 0;
                transition: opacity 0.5s ease;
            }
            h1 {
                align-items: center;
                margin: auto;
                height: 1%;
                display: flex;
                justify-content: center;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            }
            h2, p {
                text-align: center;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            }
            a {
                align-items: center;
                margin: 4%;
                height: 20%;
                display: flex;
                justify-content: center;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                color: rgb(0, 196, 236);
                text-decoration: none;
            }
            p {
                margin-left: 5%;
                margin-right: 5%;
            }
            button {
                border: 5px;
                border-radius: 35px;
                padding: 2%;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                font-size: 45px;
                margin: 1%;
                cursor: pointer;
            }
            button:active {
                transform: scale(1.05);
                transition: 100ms ease-in-out;
            }
            .E {
                background-color: rgb(0, 255, 128);
            }
            .E:active{
                background-color: rgb(51, 194, 51);
            }
            .B {
                background-color: rgb(0, 238, 255);
            }
            .B:active{
                background-color: rgb(0, 196, 236);
            }
            .F {
                background-color: rgb(255, 0, 0);
            }
            .F:active{
                background-color: rgb(196, 0, 0);
            }
            .C {
                background-color: rgb(149, 0, 255);
                font-size: 25px;
                padding: 7%;
            }
            .C:active{
                background-color: rgb(106, 0, 182);
            }
            .Q {
                background-color: rgb(255, 166, 0);
                font-size: 25px;
            }
            .Q:active {
                background-color: rgb(201, 131, 0);
            }
            .A {
                background-color: rgb(0, 255, 252);
            }
            .A:active {
                background-color: rgb(0, 190, 181);
            }
            .center {
                align-items: center;
                justify-content: center;
                display: flex;
            }
            .links {
                vertical-align: middle;
                gap: 1%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            table {
                width: 92%;
                border-collapse: separate;
                border-spacing: 25px 10px; 
            }
            th {
                padding: 10px;
                width: 20%;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            }
            td {
                height: fit-content;
                text-align: center;
                vertical-align: middle;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                font-weight: bold;
                font-size: 100%;
            }
            img {
                padding: 2%;
            }
            .small {
                font-size: x-small;
            }
            .arrow {
                cursor: pointer;
                margin: 50px;
                justify-content: center;
                align-items: center;
            }
            .facts {
                border-spacing: 1% 10px; 
            }
            @media only screen and (min-width: 0px) {
                button {
                    font-size: 30px;
                    padding: 2%;
                    margin: 1%;
                }
            }
            @media only screen and (min-width: 768px) {
                button {
                    font-size: 45px;
                    padding: 5%;
                    margin: 3%;
                }
            }
            @media only screen and (min-width: 2000px) {
                button {
                    font-size: 100px;
                    padding: 5%;
                    margin: 3%;
                }
            }
            @media only screen and (min-width: 0px) {
                .Q, .C {
                    font-size: 30px;
                    padding: 2%;
                    margin: 1%;
                }
                .C {
                    padding: 9%;
                }
            }
            @media only screen and (min-width: 768px) {
                .Q, .C {
                    font-size: 45px;
                    padding: 5%;
                    margin: 3%;
                }
                .C {
                    padding: 10%;
                }
            }
            @media only screen and (min-width: 2000px) {
                .Q, .C {
                    font-size: 100px;
                    padding: 5%;
                    margin: 3%;
                }
                .C {
                    padding: 10%;
                }
            }
        </style>
        <div id="loader">
            <div class="spinner"></div>
        </div>
        <div id="main-content">
            <h1 id="Title">About the author</h1>
            <div class="center">
                <button id="Early"; class="E">Life story</button>
                <button id="Books"; class="B">Books</button>
                <button id="Facts"; class="F">Facts</button>
            </div>
            <div class="center" id="Display">
            </div>
            <div class="center" id="Image">
            </div>
            <div class="center" id="Table">
            </div>
            <div class="center" id="Info">
            </div>
            <div class="center" id="Line_2">
            </div>
            <div class="center" id="Line_3">
            </div>
            <div id="button">
            </div>
            <div class="center arrow" id="up-arrow">
                <img src="up-arrow.png" height="30">
            </div>
        </div>
        <script>
            const early = document.getElementById("Early");
            const books = document.getElementById("Books");
            const facts = document.getElementById("Facts");
            const display = document.getElementById("Display");
            const table = document.getElementById("Table");
            const image = document.getElementById("Image");
            const info = document.getElementById("Info");
            const line_2 = document.getElementById("Line_2");
            const line_3 = document.getElementById("Line_3");
            const arrow = document.getElementById("up-arrow");
            const button = document.getElementById("button");
            function showEarly() {
                display.innerHTML = "<h2>Life Story<h2>"
                table.innerHTML = ""
                let infoHTML = "<p>Edward Morgan Forster was born in 1879 in London. He was supposed to be called Henry but he was accidentially baptised as Edward. His dad died before he turned 2 years old. He was educated in Tonbridge School where he studied History and Classics. He was raised by his mother and other relatives. He then went to King's College, Camberidge. He lived with his mum from 1925-1945 (until she died).</p>"
                info.innerHTML = infoHTML
                line_2.innerHTML = "<p>He published many books in the early 1900s. One of his books - <i>Howards End</i> - was based on where he lived. His novels frequently included class divisions and cultural misunderstandings. His book <i>Maurice</i> wasn't published until after he died because it contained same-sex love which was illegal at the time. He travelled a lot and his trip to India inspired him to write his most famous book - <i>A Pasage to India</i>.</p>"
                line_3.innerHTML = "<p>He went on to become a respected broadcaster and wrote many short stories, including <i>The Machine Stops</i>. His stories usually told people to connect with other people outside their class. He was awarded an <i>Order of Merit</i> for his outstandind contribution to literature in 1969, on his 90th birthday. He passed away a year later, in 1970.</p>"
                image.innerHTML = `<img src="EM_Forster1.png" width=20%>`
                button.innerHTML = `<a href="quiz.html"><button class="Q">Try the quiz!</button></a>`
            };
            function showBooks() {
                display.innerHTML = "<h2>Famous books</h2><br>"
                image.innerHTML = ""
                let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Book</th>
                            <th>Photo</th>
                            <th>Plublished</th>
                            <th>Length</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>A Passage to India</td>
                            <td><img src="A_passage_to_India.png" width=80%></td>
                            <td>4/6/1924</td>
                            <td>416 pages</td>
                        </tr>
                        <tr>
                            <td>A Room With a View</td>
                            <td><img src="A-Room_with_a_view.jpg" width=80%></td>
                            <td>22/10/1909</td>
                            <td>256 pages</td>
                        </tr>
                        <tr>
                            <td>Maurice</td>
                            <td><img src="Maurice.png" width=80%></td>
                            <td>7/10/1971</td>
                            <td>272 pages</td>
                        </tr>
                        <tr>
                            <td>Howards End</td>
                            <td><img src="Howards_End.jpg" width=80%></td>
                            <td>18/10/1910</td>
                            <td>336 pages</td>
                        </tr>
                        <tr>
                            <td>Where Angels Fear to Tread</td>
                            <td><img src="Forster-Angels.jpg" width=80%></td>
                            <td>8/1905</td>
                            <td>319 pages</td>
                        </tr>
                        <tr>
                            <td>The Longest Journey</td>
                            <td><img src="The_longest_journey.jpg" width=80%></td>
                            <td>4/1907</td>
                            <td>360 pages</td>
                        </tr>
                    </tbody>
                </table>
            `
            table.innerHTML = tableHTML
            info.innerHTML = ""
            line_2.innerHTML = ""
            line_3.innerHTML = ""
            button.innerHTML = ""
            };
            function showFacts() {
                display.innerHTML = "<h2>Facts</h2>"
                table.innerHTML = `
                <table class="facts">
                    <thead>
                        <tr>
                            <th>Fact No.</th>
                            <th>Fact</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1.</td>
                            <td>His full name is Edward Morgan Forster</td>
                        </tr>
                        <tr>
                            <td>2.</td>
                            <td>He declined a knighthood in 1949</td>
                        </tr>
                        <tr>
                            <td>3.</td>
                            <td>He was nominated for the Nobel Prize in Literature 22 seperate years</td>
                        </tr>
                        <tr>
                            <td>4.</td>
                            <td>Some of his books were made into films</td>
                        </tr>
                        <tr>
                            <td>5.</td>
                            <td>His house on Howards End is a Grade 1 listed building</td>
                        </tr>
                        <tr>
                            <td>6.</td>
                            <td>He co-authored the opera <i>Billy Budd</i></td>
                        </tr>
                        <tr>
                            <td>7.</td>
                            <td>He wrote essays, speeches, stories and broadcasts</td>
                        </tr>
                        <tr>
                            <td>8.</td>
                            <td>He wrote 6 novels and 2 collections of short stories</td>
                        </tr>
                    </tbody>
                </table>`
                info.innerHTML = ""
                image.innerHTML = `<img src="EM_Forster2.jpg" width=30%>`
                line_2.innerHTML = ""
                line_3.innerHTML = ""
                button.innerHTML = ""
            };
            function scrollToTop() {
                document.getElementById('Title').scrollIntoView({ behavior: 'smooth', block: 'start' })
            }
            early.addEventListener('click', showEarly);
            books.addEventListener('click', showBooks);
            facts.addEventListener('click', showFacts);
            arrow.addEventListener('click', scrollToTop);
        </script>
    </body>
    <footer>
        <div class="links">
            <a href="Context.html">
                <button class="C">Context</button>
            </a>
            <a href="Guide.html">
                <button class="A">Comparison</button>
            </a>
        </div>
        <p class="small">English Project on E.M. Forster 2026</p>
    </footer>
    <script>
            const imagesToPreload = [
            'EM_Forster1.png',
            'up-arrow.png',
            'EM_Forster2.jpg',
            'A_passage_to_India.png',
            'A-Room_with_a_view.jpg',
            'Maurice.png',
            'Howards_End.jpg',
            'Forster-Angels.jpg',
            'The_longest_journey.jpg'
            ];

            let loadedCount = 0;
            const totalImages = imagesToPreload.length;
            function revealSite() {
                const loader = document.getElementById('loader');
                const content = document.getElementById('main-content');
                
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                content.style.opacity = '1';
            }
            if (totalImages === 0) {
            revealSite();
            } else {
            imagesToPreload.forEach(url => {
                const img = new Image();
                img.onload = handleImageLoad;
                img.onerror = handleImageLoad; 
                
                img.src = url;
            });
            }
            function handleImageLoad() {
            loadedCount++;
            if (loadedCount === totalImages) {
                revealSite();
            }
            }
        </script>
</html>
